name: Nextjs second build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Make-build
        run: npm run build

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: nextjs-build
          path: .next
          include-hidden-files: true
